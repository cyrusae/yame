# cargo-mutants configuration  https://mutants.rs/

# Multiply the measured baseline test time for per-mutant timeout.
# 2× is comfortable for a small crate; tighten to 1.5 once the suite is fast.
timeout_multiplier = 2.0

# Hard floor so a cold cache doesn't time out on fast machines.
minimum_test_timeout = 20

# I/O-only functions are annotated with #[mutants::skip] directly in source
# (see src/main.rs, src/app.rs, src/clipboard.rs, src/config.rs, src/renderer.rs,
# src/input.rs).  No file-level exclusions needed — per-item annotations are more precise.
#
# Mutants that cannot be killed by any test are excluded here with an explanation.
exclude_re = [
    # Clipboard Ctrl+C / Ctrl+V match arms in handle_key_event: arboard requires a live
    # display server (X11 / Wayland / macOS pasteboard), which is unavailable in CI.
    # The underlying handle_copy / handle_paste are already annotated #[mutants::skip]
    # in clipboard.rs for the same reason.
    "delete match arm.*Char.'c'.*in handle_key_event",
    "delete match arm.*Char.'v'.*in handle_key_event",

    # Equivalent mutant: `KeyModifiers::CONTROL | KeyModifiers::ALT` and
    # `KeyModifiers::CONTROL ^ KeyModifiers::ALT` produce the same bitmask (0x06)
    # because the two flags occupy non-overlapping bits.  No test can observe a
    # difference, so this mutant is structurally unkillable.
    "replace \\| with \\^ in handle_pair_wrap",
]
